<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>L&L Soluções Financeiras</title>

<style>

body{
font-family: Arial;
margin:0;
background:#0f172a;
color:white;
}

header{
background:#020617;
padding:20px;
text-align:center;
font-size:30px;
font-weight:bold;
}

.hero{
padding:100px 20px;
text-align:center;
background-image:url("https://images.unsplash.com/photo-1554224155-6726b3ff858f");
background-size:cover;
background-position:center;
}

.hero h1{
font-size:42px;
}

button{
background:#d4af37;
border:none;
padding:15px 30px;
font-size:18px;
border-radius:8px;
cursor:pointer;
}

.services{
display:flex;
justify-content:center;
gap:30px;
padding:50px;
flex-wrap:wrap;
}

.card{
background:#1e293b;
padding:30px;
border-radius:10px;
width:200px;
text-align:center;
}

form{
padding:40px;
text-align:center;
}

input,select{
padding:10px;
margin:10px;
width:250px;
border-radius:6px;
border:none;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25d366;
padding:15px;
border-radius:50%;
color:white;
font-weight:bold;
}

</style>

</head>

<body>

<header>
L&L Soluções Financeiras
</header>

<section class="hero">

<h1>Crédito rápido e sem burocracia</h1>

<p>FGTS • INSS • Bolsa Família • Conta de Energia</p>

<button onclick="document.getElementById('simulacao').scrollIntoView()">Simular Crédito</button>

</section>

<section class="services">

<div class="card">Antecipação FGTS</div>

<div class="card">Crédito INSS</div>

<div class="card">Bolsa Família</div>

<div class="card">Conta de Energia</div>

</section>

<section id="simulacao">

<h2 style="text-align:center;">Simulação de Crédito</h2>

<form>

<input placeholder="Seu nome">

<br>

<input placeholder="WhatsApp">

<br>

<input placeholder="Cidade">

<br>

<select>

<option>Tipo de crédito</option>

<option>Antecipação FGTS</option>

<option>Crédito INSS</option>

<option>Bolsa Família</option>

<option>Conta de Energia</option>

</select>

<br>

<input placeholder="Valor desejado">

<br>

<button>Enviar Simulação</button>

</form>

</section>

<a class="whatsapp" href="https://wa.me/">WhatsApp</a>

</body>
</html>
